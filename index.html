<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NS Leads — Brand Leads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            linen: '#F1EDE5',
            ink: '#1B1A17',
            hair: '#D9D2C4',
          },
        },
      },
    };
  </script>
  <style>
    html, body { background-color: #F1EDE5; }
    body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; color: #1B1A17; }
    .hair { border-color: #D9D2C4; }
    .pill {
      display: inline-flex; align-items: center;
      padding: 3px 10px;
      border-radius: 9999px;
      font-size: 11px; font-weight: 500;
      line-height: 1.4; letter-spacing: 0.01em;
      white-space: nowrap;
    }
    .card {
      background: #FFFFFF;
      border: 1px solid #D9D2C4;
      border-radius: 12px;
      padding: 18px 20px 16px;
      box-shadow: 0 1px 0 rgba(27,26,23,0.02);
    }
    .row-line {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid #EBE5D6;
      font-size: 13.5px;
    }
    .row-line:last-of-type { border-bottom: 0; }
    .row-line .ico {
      width: 16px; height: 16px; flex: none;
      color: #8C8473;
    }
    .row-line .lbl {
      width: 76px; flex: none;
      font-size: 12px; font-weight: 500; color: #5C574D;
    }
    .row-line .val { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    a.lnk { color: #1B1A17; text-decoration: underline; text-decoration-color: #B8AE99; text-underline-offset: 2px; }
    a.lnk:hover { text-decoration-color: #1B1A17; }
    .nav-link {
      padding: 7px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      color: #5C574D;
      border: 1px solid transparent;
    }
    .nav-link:hover { background: #EAE4D5; color: #1B1A17; }
    .nav-link.active {
      background: #FFFFFF; color: #1B1A17;
      border-color: #D9D2C4;
    }
    textarea.notes {
      width: 100%;
      margin-top: 12px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      color: #1B1A17;
      background: #FBF8F1;
      border: 1px solid #E5DECF;
      border-radius: 8px;
      resize: vertical;
      min-height: 64px;
    }
    textarea.notes:focus { outline: none; border-color: #B8AE99; }
    .check {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 4px;
      border: 1px solid #D9D2C4;
      background: #FFFFFF;
      color: transparent;
      font-size: 13px;
    }
    .check.on {
      background: #2F8A4E; border-color: #2F8A4E; color: #FFFFFF;
    }
  </style>
</head>
<body>
  <header class="border-b hair bg-[#F1EDE5]">
    <div class="max-w-[1280px] mx-auto px-6 pt-6 pb-4">
      <div class="flex items-baseline justify-between gap-6 flex-wrap">
        <div>
          <h1 id="pageTitle" class="text-2xl font-semibold tracking-tight">Brand Leads</h1>
          <p id="pageSubtitle" class="text-[11px] uppercase tracking-[0.12em] text-[#5C574D] mt-1">NEW LEADS &middot; HAS CREATINE</p>
          <p id="meta" class="text-xs text-[#5C574D] mt-1">Loading&hellip;</p>
        </div>
        <input
          id="q"
          type="search"
          autocomplete="off"
          placeholder="Search brand, CEO, website, status&hellip;"
          class="w-[320px] max-w-full px-3 py-2 text-sm bg-white border hair rounded-md focus:outline-none focus:ring-2 focus:ring-[#1B1A17]/10 focus:border-[#1B1A17]/40"
        />
      </div>
      <nav id="nav" class="flex items-center gap-2 mt-4">
        <a class="nav-link active" href="/">Has Creatine <span id="navCountHas" class="text-[#A39B89]">(&hellip;)</span></a>
        <a class="nav-link" href="/verified.html">Verified <span id="navCountVer" class="text-[#A39B89]">(&hellip;)</span></a>
        <a class="nav-link" href="/creatine.html">All Creatine <span id="navCountCre" class="text-[#A39B89]">(&hellip;)</span></a>
      </nav>
    </div>
  </header>

  <main class="max-w-[1280px] mx-auto px-6 py-6">
    <div id="status" class="text-sm text-[#5C574D] mb-4"></div>
    <div id="cards" class="grid gap-4 grid-cols-1 md:grid-cols-2"></div>
  </main>

  <script>
    // ============================================================
    // Page config — override per page (see verified.html)
    // ============================================================
    window.PAGE_CONFIG = window.PAGE_CONFIG || {
      viewId: 'viwXYjVkt7keSAOKU',
      countLabel: 'brands',
    };

    // ============================================================
    // Multipleselect color hint → pill color
    // Airtable color names live like "yellowLight2", "greenBright", etc.
    // ============================================================
    const COLOR_MAP = {
      red:    { bg: '#F3DCDC', fg: '#5C1E1E' },
      orange: { bg: '#F6E1CC', fg: '#5C3514' },
      yellow: { bg: '#F6E8C7', fg: '#5C4014' },
      green:  { bg: '#E4F1DC', fg: '#2F5414' },
      teal:   { bg: '#D5ECEA', fg: '#1F4D48' },
      blue:   { bg: '#DFE9F3', fg: '#1F3D5C' },
      cyan:   { bg: '#D6ECF3', fg: '#1F4A5C' },
      purple: { bg: '#E5DCF1', fg: '#3D1F5C' },
      pink:   { bg: '#F3DCEC', fg: '#5C1F47' },
      gray:   { bg: '#E8E3D6', fg: '#5C574D' },
      grey:   { bg: '#E8E3D6', fg: '#5C574D' },
    };
    // Pipeline Status semantic fallback
    const PIPELINE_COLORS = {
      'next hit list':  { bg: '#E4F1DC', fg: '#2F5414' },
      'owe follow up':  { bg: '#F6E8C7', fg: '#5C4014' },
      'find event':     { bg: '#DFE9F3', fg: '#1F3D5C' },
      'fresh leads':    { bg: '#E4F1DC', fg: '#2F5414' },
      'contacted':      { bg: '#DFE9F3', fg: '#1F3D5C' },
      'cold':           { bg: '#F3DCDC', fg: '#5C1E1E' },
      'dead':           { bg: '#F3DCDC', fg: '#5C1E1E' },
    };

    function airtableColorToPill(colorStr) {
      if (!colorStr) return COLOR_MAP.gray;
      const base = String(colorStr).toLowerCase().replace(/(light|bright|dark)\d*$/, '').trim();
      return COLOR_MAP[base] || COLOR_MAP.gray;
    }
    function pipelinePill(name) {
      const key = (name || '').toString().toLowerCase().trim();
      return PIPELINE_COLORS[key] || { bg: '#E8E3D6', fg: '#5C574D' };
    }

    // ============================================================
    // Icons (inline SVG, monoline)
    // ============================================================
    const ICONS = {
      user: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>',
      ig:   '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>',
      web:  '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.8 3 2.8 15 0 18M12 3c-2.8 3-2.8 15 0 18"/></svg>',
      search:'<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
      creatine:'<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h10v4l-2 2v8a4 4 0 0 1-4 4h-2a4 4 0 0 1-4-4V9l2-2V3z"/><path d="M7 12h10"/></svg>',
      include:'<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 12l3 3 5-6"/></svg>',
      bigbox:'<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l1.6-5h14.8L21 9"/><path d="M4 9h16v10a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9z"/><path d="M9 13h6"/></svg>',
    };

    let RAW = [];
    let VIEW = [];

    init();

    async function init() {
      const cfg = window.PAGE_CONFIG;
      try {
        const r = await fetch(`/api/leads?view=${encodeURIComponent(cfg.viewId)}`);
        if (!r.ok) {
          const t = await r.text();
          throw new Error(`HTTP ${r.status}: ${t.slice(0, 200)}`);
        }
        const data = await r.json();
        RAW = Array.isArray(data.leads) ? data.leads : [];
        document.getElementById('meta').textContent =
          `${RAW.length.toLocaleString()} ${cfg.countLabel}`;
        applyFilter();
      } catch (err) {
        document.getElementById('status').innerHTML =
          `<span class="text-[#5C1E1E]">Failed to load: ${escapeHTML(err.message)}</span>`;
        console.error(err);
      }
      // Sidecar fetches for nav counts (cheap — same /api/leads, but for the other view)
      hydrateNavCounts();
    }

    async function hydrateNavCounts() {
      const HAS = 'viwXYjVkt7keSAOKU';
      const VER = 'viwAoPiES9KMD3IVG';
      // If the current page already gave us one count, use it
      const cur = window.PAGE_CONFIG.viewId;
      if (cur === HAS) {
        document.getElementById('navCountHas').textContent = `(${RAW.length})`;
        fetch(`/api/leads?view=${VER}`).then(r => r.json()).then(d => {
          document.getElementById('navCountVer').textContent = `(${(d.count ?? (d.leads || []).length) || 0})`;
        }).catch(() => {});
      } else if (cur === VER) {
        document.getElementById('navCountVer').textContent = `(${RAW.length})`;
        fetch(`/api/leads?view=${HAS}`).then(r => r.json()).then(d => {
          document.getElementById('navCountHas').textContent = `(${(d.count ?? (d.leads || []).length) || 0})`;
        }).catch(() => {});
      }
    }

    document.getElementById('q').addEventListener('input', debounce(applyFilter, 150));

    function applyFilter() {
      const q = document.getElementById('q').value.trim().toLowerCase();
      let v = RAW;
      if (q) {
        v = RAW.filter((r) => {
          const hay = [
            r['Brand Name'],
            r['CEO Name'],
            r['Website'],
            extractSelect(r['Pipeline Status']),
            extractSelect(r['Brand Status']),
          ].filter(Boolean).join(' ').toLowerCase();
          return hay.includes(q);
        });
      }
      VIEW = v;
      renderCards();

      const cfg = window.PAGE_CONFIG;
      const total = RAW.length;
      const shown = VIEW.length;
      document.getElementById('status').textContent =
        q
          ? `Showing ${shown.toLocaleString()} of ${total.toLocaleString()} ${cfg.countLabel}`
          : `${total.toLocaleString()} ${cfg.countLabel}`;
    }

    function renderCards() {
      const wrap = document.getElementById('cards');
      const frag = document.createDocumentFragment();
      for (const r of VIEW) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = renderCardHTML(r);
        frag.appendChild(card);
      }
      wrap.innerHTML = '';
      wrap.appendChild(frag);
      if (!VIEW.length) {
        wrap.innerHTML = `<div class="text-sm text-[#5C574D] py-8">No brands match.</div>`;
      }
    }

    function renderCardHTML(r) {
      const brand = r['Brand Name'] || '(Unnamed brand)';
      const status = extractSelect(r['Pipeline Status']);
      const statusC = pipelinePill(status);
      const statusPill = status
        ? `<span class="pill" style="background:${statusC.bg};color:${statusC.fg};">${escapeHTML(status)}</span>`
        : '';

      const ceo = r['CEO Name'] || '';
      const ig = r['CEO Instagram'] || r['CEO IG'] || '';
      const igHandle = ig ? formatIgHandle(ig) : '';
      const igUrl = ig ? formatIgUrl(ig) : '';
      const website = r['Website'] || '';
      const searchUrl = r['Search Creatine'] || '';

      // Has Creatine — multipleSelects: [{id,name,color}]
      const hasCreatineRaw = r['Has Creatine'];
      const CREATINE_FORMAT_COLORS = {
        powder: COLOR_MAP.yellow, gummies: COLOR_MAP.green, chews: COLOR_MAP.red,
        chewables: COLOR_MAP.blue, capsules: COLOR_MAP.purple,
        no: COLOR_MAP.gray, unknown: COLOR_MAP.gray,
      };
      const colorForName = (n) =>
        CREATINE_FORMAT_COLORS[String(n || '').toLowerCase()] || COLOR_MAP.gray;
      let creatineHTML = '<span class="text-[#A39B89]">&mdash;</span>';
      if (Array.isArray(hasCreatineRaw) && hasCreatineRaw.length) {
        creatineHTML = hasCreatineRaw.map((opt) => {
          const name = (typeof opt === 'string') ? opt : (opt && opt.name) || '';
          const c = (typeof opt === 'string')
            ? colorForName(name)
            : airtableColorToPill(opt && opt.color);
          return `<span class="pill" style="background:${c.bg};color:${c.fg};">${escapeHTML(name)}</span>`;
        }).join(' ');
      } else if (typeof hasCreatineRaw === 'string' && hasCreatineRaw) {
        const c = colorForName(hasCreatineRaw);
        creatineHTML = `<span class="pill" style="background:${c.bg};color:${c.fg};">${escapeHTML(hasCreatineRaw)}</span>`;
      }

      const include = !!r['Include'];
      const includeHTML = include
        ? `<span class="check on" title="Included">&#10003;</span>`
        : `<span class="check" title="Not included"></span>`;

      const bigBoxStatus = extractSelect(r['Big Box Status']);
      const bigBoxRetailers = r['Found in Retailers'] || '';
      let bigBoxHTML = '<span class="text-[#A39B89]">&mdash;</span>';
      if (bigBoxStatus) {
        const bbc = bigBoxStatus.toLowerCase() === 'yes' ? COLOR_MAP.green : COLOR_MAP.gray;
        bigBoxHTML = `<span class="pill" style="background:${bbc.bg};color:${bbc.fg};">${escapeHTML(bigBoxStatus)}</span>`
          + (bigBoxRetailers ? ` <span class="text-[#5C574D]">${escapeHTML(bigBoxRetailers)}</span>` : '');
      }

      const notes = r['IMN Notes'] || '';

      return `
        <div class="flex items-start justify-between gap-3 mb-2">
          <h3 class="text-[16px] font-semibold leading-snug pr-2">${escapeHTML(brand)}</h3>
          <div class="flex-none">${statusPill}</div>
        </div>
        <div>
          <div class="row-line">
            ${ICONS.user}
            <div class="lbl">CEO</div>
            <div class="val">${ceo ? escapeHTML(ceo) : '<span class="text-[#A39B89]">&mdash;</span>'}</div>
          </div>
          <div class="row-line">
            ${ICONS.ig}
            <div class="lbl">CEO IG</div>
            <div class="val">${
              ig
                ? `<a class="lnk" href="${escapeAttr(igUrl)}" target="_blank" rel="noopener">${escapeHTML(igHandle)}</a>`
                : '<span class="text-[#A39B89]">&mdash;</span>'
            }</div>
          </div>
          <div class="row-line">
            ${ICONS.web}
            <div class="lbl">Website</div>
            <div class="val">${
              website
                ? `<a class="lnk" href="${escapeAttr(website)}" target="_blank" rel="noopener">${escapeHTML(hostnameOnly(website))}</a>`
                : '<span class="text-[#A39B89]">&mdash;</span>'
            }</div>
          </div>
          <div class="row-line">
            ${ICONS.search}
            <div class="lbl">Search</div>
            <div class="val">${
              searchUrl
                ? `<a class="lnk" href="${escapeAttr(searchUrl)}" target="_blank" rel="noopener">Search Creatine Products</a>`
                : '<span class="text-[#A39B89]">&mdash;</span>'
            }</div>
          </div>
          <div class="row-line">
            ${ICONS.creatine}
            <div class="lbl">Creatine</div>
            <div class="val">${creatineHTML}</div>
          </div>
          <div class="row-line">
            ${ICONS.include}
            <div class="lbl">Include</div>
            <div class="val">${includeHTML}</div>
          </div>
          <div class="row-line">
            ${ICONS.bigbox}
            <div class="lbl">Big Box</div>
            <div class="val" style="white-space:normal;">${bigBoxHTML}</div>
          </div>
        </div>
        <textarea class="notes" placeholder="Add notes about this lead..." readonly>${escapeHTML(notes)}</textarea>
      `;
    }

    // ============================================================
    // Helpers
    // ============================================================
    function extractSelect(v) {
      if (!v) return '';
      if (typeof v === 'string') return v;
      if (Array.isArray(v)) return v.map(extractSelect).filter(Boolean).join(', ');
      if (typeof v === 'object' && typeof v.name === 'string') return v.name;
      return '';
    }
    function formatIgHandle(v) {
      const s = String(v || '').trim();
      // url?
      const m = s.match(/instagram\.com\/([^\/\?#]+)/i);
      if (m) return '@' + m[1].replace(/^@/, '');
      return s.startsWith('@') ? s : '@' + s.replace(/^https?:\/\//, '');
    }
    function formatIgUrl(v) {
      const s = String(v || '').trim();
      if (/^https?:\/\//i.test(s)) return s;
      const handle = s.replace(/^@/, '');
      return `https://instagram.com/${handle}`;
    }
    function hostnameOnly(url) {
      try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return url; }
    }
    function escapeHTML(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function escapeAttr(s) { return escapeHTML(s); }
    function debounce(fn, ms) {
      let t;
      return function () {
        clearTimeout(t);
        const args = arguments;
        t = setTimeout(() => fn.apply(null, args), ms);
      };
    }
  </script>
</body>
</html>
